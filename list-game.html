<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dava Games | Game Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">
            <a href="index.html">
                <img src="image/logo.png" alt="Logo Dava Games">
            </a>
        </div>
        <a href="harga.html" class="nav-btn">Kembali</a>
    </nav>

    <header class="hero" style="min-height: auto; padding: 120px 20px 50px;">
        <div class="huge-text-bg" style="position: relative; top: 0; left: 0; transform: none;">
            <div class="text-pink">GAME</div>
            <div class="text-cyan" style="margin-top: -15px;">LIST</div>
        </div>
    </header>

    <section class="filter-section">
        <div class="filter-container">
            <div class="filter-box">
                <label for="console">Console</label>
                <select id="console">
                    <option value="all">Semua Console</option>
                    <option value="ps5">PlayStation 5</option>
                    <option value="ps4">PlayStation 4</option>
                    <option value="ps3">PlayStation 3</option>
                </select>
            </div>

            <div class="filter-box">
                <label for="genre">Genre</label>
                <select id="genre">
                    <option value="all">Semua Genre</option>
                    <option value="action">Action / Adventure</option>
                    <option value="sports">Sports / Racing</option>
                    <option value="fighting">Fighting</option>
                    <option value="party">Party / Family</option>
                    <option value="rpg">RPG</option>
                </select>
            </div>

            <div class="search-box">
                <div class="search-icon">🔍</div>
                <input type="text" id="search" placeholder="Cari nama game...">
            </div>
        </div>
    </section>

    <section class="game-katalog">
        <div class="game-grid" id="game-list">
            </div>
    </section>

    <footer>
        <p class="copyright">© 2026 Dava Games. All rights reserved.</p>
    </footer>

    <script src="list-game.js"></script>

</body>
</html>
