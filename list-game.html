<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Game | Dava Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">
            <a href="index.html"><img src="image/logo.png" alt="Logo Dava Games"></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Kembali ke Beranda</a></li>
        </ul>
    </nav>

    <section class="filter-section">
        <div class="filter-container">
            
            <div class="filter-box">
                <label>Console</label>
                <select id="console-filter">
                    <option value="all">Semua Konsol</option>
                    <option value="ps5">PlayStation 5</option>
                    <option value="ps4">PlayStation 4</option>
                    <option value="ps3">PlayStation 3</option>
                </select>
            </div>

            <div class="filter-box">
                <label>Genre</label>
                <select id="genre-filter">
                    <option value="all">Semua Genre</option>
                    <option value="action">Action / Adventure</option>
                    <option value="sports">Sports</option>
                    <option value="rpg">RPG</option>
                    <option value="fighting">Fighting</option>
                    <option value="racing">Racing</option>
                </select>
            </div>

            <div class="search-box">
                <div class="search-icon">🔍</div>
                <input type="text" id="search-input" placeholder="Cari nama game...">
            </div>

        </div>
    </section>

    <section class="game-katalog">
        <div id="game-grid" class="game-grid">
            </div>
        
        <div id="no-game-msg" style="display: none; text-align: center; width: 100%; color: #888; padding: 50px;">
            <h3>Game tidak ditemukan. Coba kata kunci lain.</h3>
        </div>
    </section>

    <footer id="kontak">
        <div class="footer-bottom" style="border-top: none;">
            <p>© 2026 Dava Games. All rights reserved.</p>
        </div>
    </footer>

    <script src="list-game.js"></script>
</body>
</html>
